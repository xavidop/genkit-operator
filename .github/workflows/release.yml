name: Release

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  MANAGER_IMAGE: ghcr.io/${{ github.repository_owner }}/genkit-operator
  RUNNER_IMAGE: ghcr.io/${{ github.repository_owner }}/genkit-runner
  CHART_REGISTRY: oci://ghcr.io/${{ github.repository_owner }}/charts

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # 1) Decide whether there is a new release using Conventional Commits.
  # ──────────────────────────────────────────────────────────────────────
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semrel.outputs.new_release_published }}
      version: ${{ steps.semrel.outputs.new_release_version }}
      tag: ${{ steps.semrel.outputs.new_release_git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Semantic Release
        id: semrel
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/git@10
            conventional-changelog-conventionalcommits@8
            conventional-changelog-writer@8.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────
  # 2) Build manager + runner images, one job per (image, platform), in
  #    parallel. Each job pushes by digest only — no tags yet.
  # ──────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: manager
            dockerfile: Dockerfile
            repo: ghcr.io/xavidop/genkit-operator
            platform: linux/amd64
            runner: ubuntu-latest
          - image: manager
            dockerfile: Dockerfile
            repo: ghcr.io/xavidop/genkit-operator
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: runner
            dockerfile: Dockerfile.runner
            repo: ghcr.io/xavidop/genkit-runner
            platform: linux/amd64
            runner: ubuntu-latest
          - image: runner
            dockerfile: Dockerfile.runner
            repo: ghcr.io/xavidop/genkit-runner
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute platform pair
        id: pair
        run: |
          # turn "linux/amd64" into "linux-amd64" for filenames
          echo "pair=${{ matrix.platform }}" | sed 's|/|-|g' >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ matrix.repo }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.image }}
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ matrix.image }}/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ steps.pair.outputs.pair }}
          path: /tmp/digests/${{ matrix.image }}/*
          if-no-files-found: error
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────
  # 3) Merge per-platform digests into a single multi-arch manifest per
  #    image, then push :<tag> and :latest.
  # ──────────────────────────────────────────────────────────────────────
  manifest:
    name: Manifest ${{ matrix.image }}
    needs: [release, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: manager
            repo: ghcr.io/xavidop/genkit-operator
          - image: runner
            repo: ghcr.io/xavidop/genkit-runner
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/${{ matrix.image }}
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        working-directory: /tmp/digests/${{ matrix.image }}
        env:
          REPO: ${{ matrix.repo }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          docker buildx imagetools create \
            -t "${REPO}:${TAG}" \
            -t "${REPO}:latest" \
            $(printf "${REPO}@sha256:%s " *)

      - name: Inspect manifest
        env:
          REPO: ${{ matrix.repo }}
          TAG: ${{ needs.release.outputs.tag }}
        run: docker buildx imagetools inspect "${REPO}:${TAG}"

  # ──────────────────────────────────────────────────────────────────────
  # 4) Package + push the Helm chart, generate install.yaml, attach both
  #    to the GitHub release that semantic-release just created.
  # ──────────────────────────────────────────────────────────────────────
  chart:
    name: Helm chart + install.yaml
    needs: [release, manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Stamp chart with release version and manager image
        env:
          VERSION: ${{ needs.release.outputs.version }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          chart=dist/chart
          sed -i -E "s/^version: .*/version: ${VERSION}/" "${chart}/Chart.yaml"
          sed -i -E "s/^appVersion: .*/appVersion: \"${VERSION}\"/" "${chart}/Chart.yaml"
          sed -i -E "s|repository: controller|repository: ${MANAGER_IMAGE}|" "${chart}/values.yaml"
          sed -i -E "s|tag: latest|tag: ${TAG}|" "${chart}/values.yaml"

      - name: Package chart
        run: helm package dist/chart --destination dist/

      - name: Log in to GHCR (Helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push chart to GHCR
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: helm push "dist/genkit-operator-${VERSION}.tgz" "${CHART_REGISTRY}"

      - name: Generate install.yaml
        env:
          IMG: ${{ env.MANAGER_IMAGE }}:${{ needs.release.outputs.tag }}
        run: make build-installer IMG="${IMG}"

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            dist/genkit-operator-${{ needs.release.outputs.version }}.tgz
            dist/install.yaml
