name: Release

"on":
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  MANAGER_IMAGE: ghcr.io/${{ github.repository_owner }}/genkit-operator
  RUNNER_IMAGE: ghcr.io/${{ github.repository_owner }}/genkit-runner
  CHART_REGISTRY: oci://ghcr.io/${{ github.repository_owner }}/charts

jobs:
  images:
    name: Build and push container images
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve version
        id: meta
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push manager image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.MANAGER_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.MANAGER_IMAGE }}:latest
          provenance: false

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.runner
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.RUNNER_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.RUNNER_IMAGE }}:latest
          provenance: false

  chart:
    name: Package and push Helm chart
    needs: images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: meta
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"

      - name: Stamp chart with release version and manager image
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          chart=dist/chart
          # Pin chart.version, chart.appVersion, and the manager image tag/repo.
          sed -i -E "s/^version: .*/version: ${VERSION}/" "${chart}/Chart.yaml"
          sed -i -E "s/^appVersion: .*/appVersion: \"${VERSION}\"/" "${chart}/Chart.yaml"
          sed -i -E "s|repository: controller|repository: ${MANAGER_IMAGE}|" "${chart}/values.yaml"
          sed -i -E "s|tag: latest|tag: ${TAG}|" "${chart}/values.yaml"
          cat "${chart}/Chart.yaml"

      - name: Package chart
        run: helm package dist/chart --destination dist/

      - name: Log in to GHCR (Helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push chart to GHCR
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: helm push "dist/genkit-operator-${VERSION}.tgz" "${CHART_REGISTRY}"

      - name: Generate install.yaml
        env:
          IMG: ${{ env.MANAGER_IMAGE }}:${{ steps.meta.outputs.tag }}
        run: make build-installer IMG="${IMG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/genkit-operator-${{ steps.meta.outputs.version }}.tgz
            dist/install.yaml
