# This rule is not used by the project genkit-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the genkit.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: genkit-operator
    app.kubernetes.io/managed-by: kustomize
  name: prompt-editor-role
rules:
- apiGroups:
  - genkit.dev
  resources:
  - prompts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - genkit.dev
  resources:
  - prompts/status
  verbs:
  - get
