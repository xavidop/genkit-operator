---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: models.genkit.dev
spec:
  group: genkit.dev
  names:
    kind: Model
    listKind: ModelList
    plural: models
    shortNames:
    - gmd
    singular: model
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.provider
      name: Provider
      type: string
    - jsonPath: .spec.model
      name: Model
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Model is the Schema for the models API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ModelSpec defines the desired state of Model.

              A Model wraps a (provider, model-id) pair and an optional declaration of
              the model's capabilities (genkit-go ai.ModelInfo) and default generation
              configuration (genkit-go ai.GenerationCommonConfig). These are stored as
              raw JSON so any Genkit runtime can consume them without conversion.
            properties:
              defaultConfig:
                description: |-
                  DefaultConfig mirrors genkit-go's ai.GenerationCommonConfig:
                  temperature, maxOutputTokens, topP, topK, stopSequences, version.
                x-kubernetes-preserve-unknown-fields: true
              info:
                description: |-
                  Info mirrors genkit-go's ai.ModelInfo: capability flags such as
                  multiturn, media, tools, systemRole, plus label/stage/versions.
                  Stored as raw JSON to avoid coupling the CRD schema to a specific
                  genkit-go minor version.
                x-kubernetes-preserve-unknown-fields: true
              model:
                description: |-
                  Model is the provider's model identifier
                  (e.g. "claude-opus-4-7", "gemini-2.0-flash", "gpt-4o").
                minLength: 1
                type: string
              pluginConfigRef:
                description: |-
                  PluginConfigRef references the PluginConfig that supplies credentials
                  and provider configuration for this model.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              provider:
                description: |-
                  Provider is the provider identifier; must match a PluginConfig.spec.type
                  (e.g. "anthropic", "googleai", "vertexai", "openai", "ollama").
                minLength: 1
                type: string
            required:
            - model
            - pluginConfigRef
            - provider
            type: object
          status:
            description: ModelStatus defines the observed state of Model.
            properties:
              conditions:
                description: |-
                  Conditions reflect the current state of the Model. Ready reflects
                  whether the referenced PluginConfig exists and is itself Ready.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the generation reflected by the
                  current status.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
