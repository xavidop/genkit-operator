---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: tools.genkit.dev
spec:
  group: genkit.dev
  names:
    kind: Tool
    listKind: ToolList
    plural: tools
    shortNames:
    - gtl
    singular: tool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.resolvedTarget
      name: Target
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Tool is the Schema for the tools API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ToolSpec defines the desired state of Tool.

              A Tool is a function the model can call. Genkit supports tools-as-flows;
              a Tool may wrap a Flow CR or an external HTTP endpoint. The schema and
              metadata in Definition mirror genkit-go's ai.ToolDefinition (name,
              description, inputSchema, outputSchema).
            properties:
              definition:
                description: "Definition mirrors genkit-go's ai.ToolDefinition. It
                  is stored as a\nraw JSON object with the standard genkit JSON tags
                  so that any Genkit\nruntime can consume it directly.\n\nExpected
                  shape:\n\n\t{\n\t  \"name\": \"string\",\n\t  \"description\": \"string\",\n\t
                  \ \"inputSchema\":  { ... JSON Schema ... },\n\t  \"outputSchema\":
                  { ... JSON Schema ... },\n\t  \"metadata\":     { ... }\n\t}"
                x-kubernetes-preserve-unknown-fields: true
              implementation:
                description: |-
                  Implementation describes how the tool is executed. Exactly one of its
                  fields must be set.
                properties:
                  flowRef:
                    description: FlowRef calls a Flow in the same namespace as the
                      tool body.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  http:
                    description: HTTP calls an external HTTP endpoint as the tool
                      body.
                    properties:
                      headersSecretRef:
                        description: |-
                          HeadersSecretRef optionally references a Secret whose keys/values
                          will be sent as additional HTTP headers (e.g. Authorization).
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      method:
                        default: POST
                        description: Method is the HTTP verb to use. Defaults to POST.
                        enum:
                        - GET
                        - POST
                        - PUT
                        - PATCH
                        - DELETE
                        type: string
                      url:
                        description: URL is the absolute endpoint URL.
                        minLength: 1
                        type: string
                    required:
                    - url
                    type: object
                type: object
            required:
            - definition
            - implementation
            type: object
          status:
            description: ToolStatus defines the observed state of Tool.
            properties:
              conditions:
                description: Conditions reflect the current state of the Tool.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the generation reflected by the
                  current status.
                format: int64
                type: integer
              resolvedTarget:
                description: |-
                  ResolvedTarget is a human-readable description of the resolved
                  implementation target (e.g. "Flow/foo" or "HTTP https://example/x").
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
