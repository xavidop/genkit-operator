apiVersion: genkit.dev/v1alpha1
kind: FlowSet
metadata:
  name: greeting-suite
  namespace: default
spec:
  image: ghcr.io/xavidop/genkit-runner:latest
  replicas: 1
  port: 8080
  serviceType: ClusterIP
  flows:
    - name: greeter-en
      # Using refs to existing Model and Prompt CRs
      modelRef:
        name: my-model
      prompts:
        - promptRef:
            name: greeting-en
    - name: greeter-es
      # Using inline model spec and inline prompt (no Model/Prompt CRs needed)
      modelSpec:
        provider: anthropic
        model: claude-opus-4-7
        pluginConfigRef:
          name: anthropic-config
      prompts:
        - prompt:
            name: saludo
            content: |
              ---
              model: anthropic/claude-opus-4-7
              config:
                max_tokens: 256
              input:
                schema:
                  name: string
              ---
              Saluda a {{name}} en español en una frase corta.
